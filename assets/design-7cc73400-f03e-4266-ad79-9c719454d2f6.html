<html lang="en" vid="0"><head vid="1">
<meta charset="UTF-8" vid="2">
<meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
<title vid="4">BSD Lab - Neural Dynamics Widget</title>
<style vid="5">
    :root {
        --bg-top: #a5b2b2;
        --bg-bottom: #9a988d;
        --line-color: rgba(42, 45, 44, 0.25);
        --line-light: rgba(255, 255, 255, 0.15);
        --text-dark: #2a2d2c;
        --text-light: #f4f4f0;
        
        
        --wave-base: rgba(244, 244, 240, 0.4);
        --wave-active: #ffffff;
        --wave-accent: #e8dcc4; 
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
    }

    
    .widget-container {
        width: 360px;
        height: 360px;
        position: relative;
        background: linear-gradient(to bottom, var(--bg-top) 50%, var(--bg-bottom) 50%);
        box-shadow: 0 24px 48px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.05);
        overflow: hidden;
    }

    
    .axis-top {
        position: absolute;
        top: 40px;
        left: 20px;
        right: 20px;
        height: 10px;
        display: flex;
        justify-content: center;
        z-index: 10;
    }

    .axis-line-h {
        position: absolute;
        top: 10px;
        width: 100%;
        height: 1px;
        background-color: var(--line-color);
    }

    .axis-line-v {
        position: absolute;
        top: 0;
        width: 1px;
        height: 10px;
        background-color: var(--line-color);
    }

    
    .micro-label {
        position: absolute;
        font-size: 8.5px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 500;
        z-index: 10;
    }

    .label-top-center {
        top: 20px;
        width: 100%;
        text-align: center;
        color: var(--text-dark);
        opacity: 0.8;
    }

    .label-bottom-left {
        bottom: 20px;
        left: 20px;
        color: var(--text-light);
    }

    .label-bottom-right {
        bottom: 20px;
        right: 20px;
        color: var(--text-light);
    }

    
    .axis-bottom {
        position: absolute;
        bottom: 40px;
        left: 20px;
        right: 20px;
        height: 1px;
        background-color: var(--line-light);
        z-index: 10;
    }

    
    .logo-mark-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 180px;
        height: 180px;
        z-index: 20;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    
    svg.brain-waves {
        width: 100%;
        height: 100%;
        overflow: visible;
    }

    .wave-path {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
    }

    
    
    
    .wave-bg {
        stroke: var(--wave-base);
        stroke-width: 1px;
    }

    
    .wave-dynamic {
        stroke: var(--wave-active);
        stroke-width: 1.5px;
        stroke-dasharray: 60 180;
        animation: flow 4s linear infinite;
    }

    .wave-accent {
        stroke: var(--wave-accent);
        stroke-width: 1px;
        stroke-dasharray: 40 200;
        animation: flow 6s linear infinite reverse;
        opacity: 0.8;
    }

    
    .w-1 { animation-delay: 0s; }
    .w-2 { animation-delay: -1.2s; stroke-dasharray: 80 160; animation-duration: 4.5s; }
    .w-3 { animation-delay: -2.5s; stroke-dasharray: 50 190; animation-duration: 3.8s; }
    .w-4 { animation-delay: -0.8s; }
    .w-5 { animation-delay: -3.1s; stroke-dasharray: 90 150; animation-duration: 5s; }

    @keyframes flow {
        from { stroke-dashoffset: 240; }
        to { stroke-dashoffset: 0; }
    }

    
    .logo-mark-wrapper {
        animation: breath 8s ease-in-out infinite alternate;
    }

    @keyframes breath {
        0% { transform: translate(-50%, -50%) scale(0.98); }
        100% { transform: translate(-50%, -50%) scale(1.02); }
    }

</style>
</head>
